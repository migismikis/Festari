<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FestariCall Pro</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#f8fafc;--green:#16a34a;--blue:#2563eb;--red:#dc2626;--orange:#f97316;--purple:#7c3aed}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:10;background:#020617;padding:14px;border-bottom:1px solid #1e293b}h1{margin:0;font-size:24px}small{color:var(--muted)}
main{padding:14px;max-width:900px;margin:auto}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.card{background:var(--card);border:1px solid #1f2937;border-radius:16px;padding:14px;margin:10px 0}
button,input{font-size:16px;border-radius:12px;border:0;padding:12px}button{font-weight:800;color:white;background:#334155}.primary{background:var(--green)}.blue{background:var(--blue)}.red{background:var(--red)}.orange{background:var(--orange)}.purple{background:var(--purple)}.gray{background:#475569}
input{width:100%;background:#e5e7eb;color:#111827}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px}.product{min-height:92px;font-size:18px;line-height:1.2;background:var(--green);position:relative}.product.pending{background:var(--orange)}.product.urgent{background:var(--red)}
.badge{position:absolute;right:8px;top:8px;background:#020617;padding:3px 7px;border-radius:999px;font-size:13px}.groupTitle{font-size:18px;margin:22px 0 8px;color:#cbd5e1}
.request{border-left:8px solid var(--green)}.request.ack{border-left-color:var(--blue);background:#102554}.request.pick{border-left-color:var(--purple);background:#24124b}.request.urgent{border-left-color:var(--red)}.request.old{box-shadow:0 0 0 2px var(--orange)}
.big{font-size:23px;font-weight:900}.meta{color:#cbd5e1;font-size:14px;margin-top:5px}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.hidden{display:none!important}
hr{border:0;border-top:1px solid #334155;margin:14px 0}.statsGrid{display:grid;grid-template-columns:1fr auto;gap:8px}.notice{background:#1e293b;border-radius:12px;padding:10px;margin:8px 0}
</style>
</head>
<body>
<header><h1>🍔 FestariCall Pro</h1><small id="status">Yhdistetään...</small></header>
<main>
<section id="setup" class="card"><h2>Asetukset</h2><p>Kirjoita nimesi ja valitse rooli. Nimi tallentuu tähän puhelimeen.</p><input id="nameInput" placeholder="Nimi, esim. Mikko"><div class="row" style="margin-top:10px"><button class="primary" onclick="saveRole('sales')">🍔 Myyntipiste</button><button class="blue" onclick="saveRole('kitchen')">👨‍🍳 Keittiö</button></div></section>
<section id="topbar" class="card hidden"><div class="row"><b id="who"></b><button class="gray" onclick="changeUser()">Vaihda nimeä/roolia</button><button class="gray" onclick="toggleSound()">Ääni: <span id="soundState">ON</span></button></div><div class="notice">Normaali painallus = tavallinen pyyntö. Pitkä painallus noin 1 s = 🚨 kiireellinen.</div></section>
<section id="sales" class="hidden"><div id="productGroups"></div></section>
<section id="kitchen" class="hidden"><h2>👨‍🍳 Saapuvat pyynnöt</h2><div id="requests"></div><hr><h2>📦 Varastomäärät</h2><div id="stock"></div><hr><h2>📈 Päivän tilastot</h2><div id="stats"></div><button class="red" onclick="clearDone()">Poista valmiit historiasta</button></section>
</main>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getFirestore,collection,addDoc,onSnapshot,updateDoc,deleteDoc,doc,serverTimestamp,query,orderBy,enableIndexedDbPersistence,setDoc,increment}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",authDomain:"kutsut-8e30a.firebaseapp.com",projectId:"kutsut-8e30a",storageBucket:"kutsut-8e30a.firebasestorage.app",messagingSenderId:"218193499800",appId:"1:218193499800:web:4c53bcc5951c238ed862ed",measurementId:"G-M44QZKKX58"};
const app=initializeApp(firebaseConfig),db=getFirestore(app);enableIndexedDbPersistence(db).catch(()=>{});
const products=[{g:"Liha",e:"🥩",n:"Pastrami"},{g:"Liha",e:"🐔",n:"Kana"},{g:"Lisukkeet",e:"🥬",n:"Punakaali"},{g:"Lisukkeet",e:"🌿",n:"Fenkoli"},{g:"Lisukkeet",e:"🌱",n:"Herneenverso"},{g:"Lisukkeet",e:"🥦",n:"Lämmin kasvis"},{g:"Lisukkeet",e:"🧅",n:"Kevätsipuli"},{g:"Lisukkeet",e:"🎃",n:"Kurpitsasalaatti"},{g:"Kastikkeet",e:"🍅",n:"Salsa"},{g:"Kastikkeet",e:"🥣",n:"Kanankastike"},{g:"Muut",e:"🍚",n:"Riisi"},{g:"Muut",e:"🫘",n:"Kikherne"},{g:"Muut",e:"🥔",n:"Peruna"},{g:"Muut",e:"🥒",n:"Kurkku"},{g:"Muut",e:"🥗",n:"Salaattipohja"},{g:"Muut",e:"🥬",n:"Vinegrettisalaatti"}];
let current={name:localStorage.getItem("fc_name")||"",role:localStorage.getItem("fc_role")||"",sound:localStorage.getItem("fc_sound")!=="off"},allRequests=[],stock={},lastCount=0;
window.saveRole=function(role){const name=document.getElementById("nameInput").value.trim();if(!name){alert("Kirjoita nimi ensin.");return}localStorage.setItem("fc_name",name);localStorage.setItem("fc_role",role);current.name=name;current.role=role;boot()};
window.changeUser=function(){localStorage.removeItem("fc_name");localStorage.removeItem("fc_role");location.reload()};
window.toggleSound=function(){current.sound=!current.sound;localStorage.setItem("fc_sound",current.sound?"on":"off");document.getElementById("soundState").textContent=current.sound?"ON":"OFF"};
function boot(){document.getElementById("nameInput").value=current.name;if(!current.name||!current.role){document.getElementById("setup").classList.remove("hidden");return}document.getElementById("setup").classList.add("hidden");document.getElementById("topbar").classList.remove("hidden");document.getElementById("who").textContent=current.name+" • "+(current.role==="sales"?"Myyntipiste":"Keittiö");document.getElementById("soundState").textContent=current.sound?"ON":"OFF";if(current.role==="sales"){document.getElementById("sales").classList.remove("hidden");renderProducts()}if(current.role==="kitchen")document.getElementById("kitchen").classList.remove("hidden");listen()}
function beep(urgent=false){if(!current.sound)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=urgent?980:660;gain.gain.value=.08;osc.start();setTimeout(()=>{osc.stop();ctx.close()},urgent?350:180)}catch(e){}if(navigator.vibrate)navigator.vibrate(urgent?[250,100,250]:200)}
function renderProducts(){const wrap=document.getElementById("productGroups");wrap.innerHTML="";[...new Set(products.map(p=>p.g))].forEach(g=>{const title=document.createElement("div");title.className="groupTitle";title.textContent=g;wrap.appendChild(title);const grid=document.createElement("div");grid.className="grid";wrap.appendChild(grid);products.filter(p=>p.g===g).forEach(p=>{const btn=document.createElement("button"),active=allRequests.filter(r=>r.item===p.n&&r.status!=="done").length,urgent=allRequests.some(r=>r.item===p.n&&r.urgent&&r.status!=="done");btn.className="product "+(urgent?"urgent":active?"pending":"");btn.innerHTML=`${p.e}<br>${p.n}${active?`<span class="badge">×${active}</span>`:""}`;let timer,long=false;const start=()=>{long=false;timer=setTimeout(()=>{long=true;sendReq(p,true)},900)},end=()=>{clearTimeout(timer);if(!long)sendReq(p,false)};btn.addEventListener("touchstart",start,{passive:true});btn.addEventListener("touchend",end);btn.addEventListener("mousedown",start);btn.addEventListener("mouseup",end);grid.appendChild(btn)})})}
async function sendReq(p,urgent){await addDoc(collection(db,"requests"),{item:p.n,emoji:p.e,requester:current.name,urgent,status:"new",createdAt:serverTimestamp(),acknowledgedBy:"",pickedBy:"",doneBy:""});await setDoc(doc(db,"stats",new Date().toISOString().slice(0,10)+"_"+p.n),{item:p.n,count:increment(1),day:new Date().toISOString().slice(0,10)},{merge:true});beep(urgent)}
function listen(){onSnapshot(query(collection(db,"requests"),orderBy("createdAt","desc")),snap=>{allRequests=snap.docs.map(d=>({id:d.id,...d.data()}));document.getElementById("status").textContent="Yhteydessä • "+new Date().toLocaleTimeString("fi-FI");if(current.role==="kitchen"){const openNow=allRequests.filter(r=>r.status!=="done").length;if(openNow>lastCount)beep(allRequests.some(r=>r.urgent&&r.status==="new"));lastCount=openNow;renderRequests()}if(current.role==="sales")renderProducts()});onSnapshot(collection(db,"stock"),snap=>{stock={};snap.docs.forEach(d=>stock[d.id]=d.data());if(current.role==="kitchen")renderStock()});onSnapshot(collection(db,"stats"),snap=>{if(current.role==="kitchen")renderStats(snap.docs.map(d=>d.data()))})}
function ageText(r){if(!r.createdAt)return"juuri nyt";const ms=Date.now()-r.createdAt.toDate().getTime(),m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000);return`${m} min ${s} s`}
function renderRequests(){const el=document.getElementById("requests"),open=allRequests.filter(r=>r.status!=="done").sort((a,b)=>(b.urgent-a.urgent)||((a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)));if(!open.length){el.innerHTML='<div class="notice">Ei avoimia pyyntöjä.</div>';return}el.innerHTML="";open.forEach(r=>{const old=r.createdAt&&(Date.now()-r.createdAt.toDate().getTime()>5*60000),div=document.createElement("div");div.className=`card request ${r.status==="ack"?"ack":""} ${r.status==="pick"?"pick":""} ${r.urgent?"urgent":""} ${old?"old":""}`;const nextText=r.status==="new"?"Huomioi":r.status==="ack"?"Keräilyssä":"Valmis";div.innerHTML=`<div class="big">${r.urgent?"🚨 ":""}${r.emoji||""} ${r.item}</div><div class="meta">Pyytäjä: <b>${r.requester||"?"}</b></div><div class="meta">Odotettu: ${ageText(r)}</div>${r.acknowledgedBy?`<div class="meta">Huomioinut: <b>${r.acknowledgedBy}</b></div>`:""}${r.pickedBy?`<div class="meta">Keräilyssä: <b>${r.pickedBy}</b></div>`:""}<div class="actions"><button class="${r.status==="new"?"blue":r.status==="ack"?"purple":"primary"}" onclick="advanceReq('${r.id}','${r.status}')">${nextText}</button><button class="orange" onclick="bumpReq('${r.id}')">➕</button><button class="gray" onclick="removeReq('${r.id}')">Poista</button></div>`;el.appendChild(div)})}
window.advanceReq=async function(id,status){const ref=doc(db,"requests",id);if(status==="new")await updateDoc(ref,{status:"ack",acknowledgedBy:current.name});else if(status==="ack")await updateDoc(ref,{status:"pick",pickedBy:current.name});else await updateDoc(ref,{status:"done",doneBy:current.name,doneAt:serverTimestamp()})};
window.removeReq=async function(id){if(confirm("Poistetaanko pyyntö?"))await deleteDoc(doc(db,"requests",id))};window.bumpReq=async function(id){const r=allRequests.find(x=>x.id===id);if(r)await sendReq({n:r.item,e:r.emoji},r.urgent)};
function renderStock(){const el=document.getElementById("stock");el.innerHTML="";products.forEach(p=>{const amount=stock[p.n]?.amount??0,div=document.createElement("div");div.className="card";div.innerHTML=`<div class="row"><b>${p.e} ${p.n}</b><span style="margin-left:auto">Jäljellä: <b>${amount}</b></span></div><div class="row" style="margin-top:8px"><button onclick="stockChange('${p.n}',-1)">−</button><button onclick="stockChange('${p.n}',1)">+</button><button onclick="stockSet('${p.n}')">Aseta</button></div>`;el.appendChild(div)})}
window.stockChange=async function(item,delta){await setDoc(doc(db,"stock",item),{amount:increment(delta)},{merge:true})};window.stockSet=async function(item){const n=prompt("Määrä tuotteelle "+item);if(n===null)return;await setDoc(doc(db,"stock",item),{amount:Number(n)||0},{merge:true})};
function renderStats(rows){const today=new Date().toISOString().slice(0,10),data=rows.filter(r=>r.day===today).sort((a,b)=>(b.count||0)-(a.count||0)),el=document.getElementById("stats");if(!data.length){el.innerHTML='<div class="notice">Ei tilastoja vielä.</div>';return}el.innerHTML='<div class="card statsGrid">'+data.map(r=>`<div>${r.item}</div><b>${r.count||0}</b>`).join("")+"</div>"}
window.clearDone=async function(){const done=allRequests.filter(r=>r.status==="done");if(!done.length)return alert("Ei valmiita poistettavia.");if(!confirm("Poistetaanko valmiit historiasta?"))return;for(const r of done)await deleteDoc(doc(db,"requests",r.id))}
setInterval(()=>{if(current.role==="kitchen")renderRequests()},1000);boot();
</script></body></html>
