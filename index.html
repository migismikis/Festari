<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festari Täydennykset</title>
  <style>
    :root {
      --bg: #101114;
      --card: #1f2229;
      --button: #178a3b;
      --button-active: #b32121;
      --text: #ffffff;
      --muted: #b9beca;
      --done: #30343d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 28px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }

    .tab {
      padding: 14px;
      border: 0;
      border-radius: 14px;
      background: var(--card);
      color: var(--text);
      font-size: 17px;
      font-weight: bold;
    }

    .tab.active {
      background: #3451ff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .product {
      min-height: 96px;
      border: 0;
      border-radius: 18px;
      background: var(--button);
      color: var(--text);
      font-size: 19px;
      font-weight: bold;
      padding: 12px;
      box-shadow: 0 4px 0 rgba(0,0,0,0.25);
    }

    .product:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }

    .product.requested {
      background: var(--button-active);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .request {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: var(--card);
      margin-bottom: 10px;
      padding: 14px;
      border-radius: 14px;
    }

    .request strong {
      display: block;
      font-size: 20px;
    }

    .request span {
      color: var(--muted);
      font-size: 14px;
    }

    .done-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      background: #3451ff;
      color: var(--text);
      font-weight: bold;
      font-size: 15px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px 8px;
      background: var(--card);
      border-radius: 14px;
    }

    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔔 Festari Täydennykset</h1>
    <div class="subtitle">Yksi painallus, vähemmän huutoa.</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showPanel('send')">Lähetä</button>
    <button class="tab" onclick="showPanel('receive')">Vastaanota</button>
  </div>

  <main id="send" class="panel active">
    <div class="grid" id="productGrid"></div>
    <div class="note">Työkaveri käyttää tätä näkymää. Painallus lisää pyynnön samaan puhelimeen tässä versiossa. Seuraavassa Firebase-versiossa pyyntö näkyy myös sinun puhelimessa netin yli.</div>
  </main>

  <main id="receive" class="panel">
    <div id="requests"></div>
    <div class="note">Sinä käytät tätä näkymää. Kun viet tavaran, paina Valmis.</div>
  </main>

  <script>
    const products = [
      { name: "Pastrami", emoji: "🥩" },
      { name: "Kana", emoji: "🐔" },
      { name: "Punakaali", emoji: "🥬" },
      { name: "Fenkoli", emoji: "🌿" },
      { name: "Riisi", emoji: "🍚" },
      { name: "Kikherne", emoji: "🫘" },
      { name: "Kanankastike", emoji: "🥣" },
      { name: "Peruna", emoji: "🥔" },
      { name: "Kurkku", emoji: "🥒" },
      { name: "Salsa", emoji: "🍅" },
      { name: "Salaattipohja", emoji: "🥗" },
      { name: "Vinegrettisalaatti", emoji: "🥬" },
      { name: "Kevätsipuli", emoji: "🧅" },
      { name: "Kurpitsasalaatti", emoji: "🎃" }
    ];

    let requests = JSON.parse(localStorage.getItem("festariRequests") || "[]");

    function save() {
      localStorage.setItem("festariRequests", JSON.stringify(requests));
    }

    function showPanel(panelId) {
      document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      document.getElementById(panelId).classList.add("active");
      event.target.classList.add("active");
      renderRequests();
    }

    function renderProducts() {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = "";

      products.forEach(product => {
        const isRequested = requests.some(req => req.name === product.name && !req.done);
        const button = document.createElement("button");
        button.className = "product" + (isRequested ? " requested" : "");
        button.innerHTML = `${product.emoji}<br>${product.name}`;
        button.onclick = () => addRequest(product);
        grid.appendChild(button);
      });
    }

    function addRequest(product) {
      const request = {
        id: Date.now(),
        name: product.name,
        emoji: product.emoji,
        time: new Date().toLocaleTimeString("fi-FI", { hour: "2-digit", minute: "2-digit" }),
        done: false
      };

      requests.unshift(request);
      save();

      if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
      renderProducts();
      renderRequests();
    }

    function markDone(id) {
      requests = requests.map(req => req.id === id ? { ...req, done: true } : req);
      save();
      renderProducts();
      renderRequests();
    }

    function renderRequests() {
      const container = document.getElementById("requests");
      const activeRequests = requests.filter(req => !req.done);

      if (activeRequests.length === 0) {
        container.innerHTML = `<div class="empty">Ei aktiivisia pyyntöjä.</div>`;
        return;
      }

      container.innerHTML = "";

      activeRequests.forEach(req => {
        const div = document.createElement("div");
        div.className = "request";
        div.innerHTML = `
          <div>
            <strong>${req.emoji} ${req.name}</strong>
            <span>Pyydetty klo ${req.time}</span>
          </div>
          <button class="done-btn" onclick="markDone(${req.id})">Valmis</button>
        `;
        container.appendChild(div);
      });
    }

    renderProducts();
    renderRequests();
  </script>
</body>
</html>
