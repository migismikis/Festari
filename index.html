<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FestariCall</title>
  <style>
    :root { --bg:#111827; --card:#1f2937; --text:#f9fafb; --muted:#9ca3af; --green:#16a34a; --red:#dc2626; --blue:#2563eb; --yellow:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, system-ui, sans-serif; background:var(--bg); color:var(--text); padding:16px; padding-bottom:40px; }
    h1 { margin: 8px 0 4px; font-size: 30px; text-align:center; }
    .sub { text-align:center; color:var(--muted); margin-bottom:18px; }
    .card { background:var(--card); border-radius:20px; padding:16px; margin:12px 0; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    .modegrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    button { border:0; border-radius:18px; padding:18px 12px; color:white; font-weight:800; font-size:19px; touch-action:manipulation; }
    button:active { transform:scale(.97); }
    .primary { background:var(--blue); min-height:95px; }
    .secondary { background:#374151; }
    .danger { background:var(--red); }
    .ok { background:var(--green); }
    .grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; }
    .product { background:var(--green); min-height:86px; line-height:1.15; }
    .product.pending { background:var(--red); }
    .topbar { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .pill { background:#374151; color:white; border-radius:999px; padding:8px 12px; font-size:14px; }
    .request { display:flex; gap:10px; justify-content:space-between; align-items:center; background:#111827; border:1px solid #374151; padding:12px; border-radius:16px; margin:10px 0; }
    .request strong { font-size:20px; }
    .request small { color:var(--muted); display:block; margin-top:4px; }
    .empty { color:var(--muted); text-align:center; padding:22px 0; }
    .hidden { display:none; }
    .toast { position:fixed; left:16px; right:16px; bottom:16px; background:#0f172a; border:1px solid #334155; color:white; padding:14px; border-radius:16px; text-align:center; font-weight:800; z-index:99; opacity:0; transform:translateY(20px); transition:.2s; }
    .toast.show { opacity:1; transform:translateY(0); }
    @media (min-width:700px){ .grid{grid-template-columns:repeat(3,1fr);} body{max-width:900px;margin:auto;} }
  </style>
</head>
<body>
  <h1>🔔 FestariCall</h1>
  <div class="sub">Täydennyspyynnöt myyntipisteeltä keittiöön</div>

  <section id="mode" class="card">
    <h2>Valitse tila</h2>
    <div class="modegrid">
      <button class="primary" onclick="setMode('sales')">🍔<br>Myyntipiste</button>
      <button class="primary" onclick="setMode('kitchen')">👨‍🍳<br>Keittiö</button>
    </div>
  </section>

  <section id="sales" class="hidden">
    <div class="topbar">
      <span class="pill">🍔 Myyntipiste</span>
      <button class="secondary" onclick="setMode(null)">Vaihda tila</button>
    </div>
    <div class="card">
      <div class="grid" id="productGrid"></div>
    </div>
  </section>

  <section id="kitchen" class="hidden">
    <div class="topbar">
      <span class="pill">👨‍🍳 Keittiö</span>
      <button class="secondary" onclick="setMode(null)">Vaihda tila</button>
    </div>
    <div class="card">
      <h2>Aktiiviset pyynnöt</h2>
      <div id="requests"></div>
    </div>
    <div class="card">
      <button class="danger" style="width:100%" onclick="clearDone()">Tyhjennä valmiit vanhat pyynnöt</button>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",
      authDomain: "kutsut-8e30a.firebaseapp.com",
      projectId: "kutsut-8e30a",
      storageBucket: "kutsut-8e30a.firebasestorage.app",
      messagingSenderId: "218193499800",
      appId: "1:218193499800:web:4c53bcc5951c238ed862ed",
      measurementId: "G-M44QZKKX58"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const requestsCol = collection(db, "requests");

    const products = [
      ["🥩", "Pastrami"], ["🐔", "Kana"], ["🥬", "Punakaali"], ["🌿", "Fenkoli"],
      ["🍚", "Riisi"], ["🫘", "Kikherne"], ["🥣", "Kanankastike"], ["🥔", "Peruna"],
      ["🥒", "Kurkku"], ["🍅", "Salsa"], ["🥗", "Salaattipohja"], ["🥬", "Vinegrettisalaatti"],
      ["🧅", "Kevätsipuli"], ["🎃", "Kurpitsasalaatti"]
    ];

    let activeProducts = new Set();
    let currentMode = localStorage.getItem("festaricall-mode") || null;
    let lastSeenId = localStorage.getItem("festaricall-lastseen") || "";

    const productGrid = document.getElementById("productGrid");
    const requestsDiv = document.getElementById("requests");

    products.forEach(([emoji, name]) => {
      const b = document.createElement("button");
      b.className = "product";
      b.dataset.name = name;
      b.innerHTML = `${emoji}<br>${name}`;
      b.onclick = () => sendRequest(name, emoji);
      productGrid.appendChild(b);
    });

    window.setMode = function(mode){
      currentMode = mode;
      if(mode) localStorage.setItem("festaricall-mode", mode);
      else localStorage.removeItem("festaricall-mode");
      document.getElementById("mode").classList.toggle("hidden", !!mode);
      document.getElementById("sales").classList.toggle("hidden", mode !== "sales");
      document.getElementById("kitchen").classList.toggle("hidden", mode !== "kitchen");
    }

    async function sendRequest(name, emoji){
      try {
        await addDoc(requestsCol, { name, emoji, status:"active", createdAt:serverTimestamp(), doneAt:null });
        buzz();
        showToast(`🔔 ${name} pyydetty`);
      } catch(e) {
        showToast("Virhe: pyyntö ei lähtenyt. Tarkista Firestore test mode.");
        console.error(e);
      }
    }

    function renderButtons(){
      document.querySelectorAll(".product").forEach(b => {
        b.classList.toggle("pending", activeProducts.has(b.dataset.name));
      });
    }

    function renderRequests(items){
      if(items.length === 0){
        requestsDiv.innerHTML = `<div class="empty">Ei aktiivisia pyyntöjä.</div>`;
        return;
      }
      requestsDiv.innerHTML = "";
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "request";
        const time = item.createdAt?.toDate ? item.createdAt.toDate().toLocaleTimeString("fi-FI", {hour:"2-digit", minute:"2-digit"}) : "nyt";
        div.innerHTML = `<div><strong>${item.emoji || "🔔"} ${item.name}</strong><small>${time}</small></div>`;
        const btn = document.createElement("button");
        btn.className = "ok";
        btn.textContent = "Valmis";
        btn.onclick = () => markDone(item.id);
        div.appendChild(btn);
        requestsDiv.appendChild(div);
      });
    }

    async function markDone(id){
      await updateDoc(doc(db, "requests", id), { status:"done", doneAt:serverTimestamp() });
      buzz();
    }
    window.markDone = markDone;

    window.clearDone = async function(){
      const q = query(requestsCol, where("status", "==", "done"));
      const snap = await getDocs(q);
      const deletes = [];
      snap.forEach(d => deletes.push(deleteDoc(doc(db, "requests", d.id))));
      await Promise.all(deletes);
      showToast("Valmiit pyynnöt tyhjennetty");
    }

    const q = query(requestsCol, orderBy("createdAt", "desc"));
    onSnapshot(q, snap => {
      const active = [];
      activeProducts = new Set();
      snap.forEach(d => {
        const data = { id:d.id, ...d.data() };
        if(data.status === "active") {
          active.push(data);
          activeProducts.add(data.name);
        }
      });
      renderButtons();
      renderRequests(active);

      if(currentMode === "kitchen" && snap.docs.length){
        const newest = snap.docs[0];
        if(lastSeenId && newest.id !== lastSeenId && newest.data().status === "active"){
          showToast(`🔔 ${newest.data().name}`);
          buzz();
          beep();
        }
        lastSeenId = newest.id;
        localStorage.setItem("festaricall-lastseen", lastSeenId);
      }
    }, err => {
      showToast("Firebase-yhteys ei toimi. Tarkista Firestore Rules.");
      console.error(err);
    });

    function buzz(){ if(navigator.vibrate) navigator.vibrate([180,80,180]); }
    function beep(){
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.05;
        osc.start(); setTimeout(()=>{osc.stop(); ctx.close();}, 180);
      } catch(e) {}
    }
    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"), 2200);
    }

    window.addEventListener("load", () => window.setMode(currentMode));
  </script>
</body>
</html>
