<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Atria Keittiöbongi</title>
<style>
:root{
  --red:#c8102e;
  --navy:#101828;
  --bg:#f2f4f7;
  --card:#ffffff;
  --border:#d0d5dd;
  --text:#101828;
  --muted:#667085;
  --green:#12805c;
  --blue:#175cd3;
  --danger:#b42318;
  --amber:#f59e0b;
  --amber-dark:#b54708;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
header{
  position:sticky;
  top:0;
  z-index:50;
  background:var(--navy);
  color:#fff;
  box-shadow:0 2px 14px rgba(16,24,40,.22);
}
.header-inner{
  max-width:1100px;
  margin:0 auto;
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.logo{
  background:var(--red);
  color:#fff;
  font-weight:900;
  letter-spacing:.8px;
  border-radius:10px;
  padding:8px 12px;
  font-size:20px;
  line-height:1;
}
.app-title{
  font-weight:900;
  font-size:20px;
  white-space:nowrap;
}
.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}
.header-button{
  width:auto;
  min-height:44px;
  padding:9px 12px;
  border-radius:999px;
  font-size:16px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
}
.chat-button{
  position:relative;
}
.chat-badge{
  position:absolute;
  top:-5px;
  right:-3px;
  min-width:20px;
  height:20px;
  border-radius:999px;
  background:var(--red);
  color:#fff;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 5px;
}
main{
  max-width:1100px;
  margin:0 auto;
  padding:14px;
}
.hidden{display:none!important}
.panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  box-shadow:0 2px 8px rgba(16,24,40,.06);
}
button,input{
  border:0;
  border-radius:14px;
  padding:16px;
  min-height:60px;
  font-size:20px;
  font-weight:900;
}
button{
  cursor:pointer;
  color:#fff;
  background:#344054;
  user-select:none;
}
button:active{transform:scale(.985)}
input{
  width:100%;
  min-height:54px;
  background:#f8fafc;
  color:var(--text);
  border:1px solid var(--border);
  font-weight:600;
}
.role-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.btn-sales,.btn-done{background:var(--green)}
.btn-kitchen,.btn-ack{background:var(--blue)}
.btn-danger{background:var(--danger)}
.group-title{
  margin:18px 0 10px;
  font-size:19px;
  font-weight:900;
  color:var(--navy);
}
.product-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
.product{
  background:var(--card);
  color:var(--text);
  border:2px solid var(--border);
  min-height:96px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;
  box-shadow:0 1px 3px rgba(16,24,40,.08);
}
.product .emoji{font-size:30px;line-height:1}
.product .label{font-size:18px;line-height:1.05;text-align:center}
.product .state-label{
  min-height:17px;
  font-size:13px;
  line-height:1;
  font-weight:900;
  letter-spacing:.2px;
  color:transparent;
}
.product.waiting{
  border-color:var(--amber-dark);
  background:#fff7ed;
}
.product.waiting .state-label{color:var(--amber-dark)}
.product.acknowledged{
  border-color:var(--amber);
  background:var(--amber);
  color:#fff;
  box-shadow:0 4px 14px rgba(245,158,11,.28);
}
.product.acknowledged .state-label{color:#fff}
.product.acknowledged .badge{
  background:#fff;
  color:var(--amber-dark);
}
.product.completed{
  animation:completedNudge 1.15s ease-out both;
  border-color:var(--green);
}
@keyframes completedNudge{
  0%{transform:translateX(0) scale(1);background:var(--card)}
  18%{transform:translateX(-5px) rotate(-1deg) scale(1.015);background:#d1fadf}
  36%{transform:translateX(6px) rotate(1deg) scale(1.025);background:#76d6a5}
  55%{transform:translateX(-3px) rotate(-.5deg) scale(1.01);background:var(--green);color:#fff}
  76%{transform:translateX(0) rotate(0) scale(1);background:#d1fadf;color:var(--text)}
  100%{transform:translateX(0) scale(1);background:var(--card);color:var(--text)}
}
.evening .product{
  border-color:#98a2b3;
  background:#f8fafc;
}
.evening .product.waiting{
  border-color:var(--amber-dark);
  background:#fff7ed;
}
.evening .product.acknowledged{
  border-color:var(--amber);
  background:var(--amber);
  color:#fff;
}
.evening .product.completed{animation:completedNudge 1.15s ease-out both}
.badge{
  position:absolute;
  top:7px;
  right:7px;
  background:var(--amber);
  color:#fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:14px;
  font-weight:900;
}
.undo-wrap{
  position:sticky;
  bottom:10px;
  z-index:30;
  margin-top:14px;
}
.undo{
  width:100%;
  background:#344054;
  box-shadow:0 8px 24px rgba(16,24,40,.25);
}
.kitchen-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.kitchen-title{font-size:24px;font-weight:900}
.counter{
  background:var(--red);
  color:#fff;
  border-radius:999px;
  padding:8px 13px;
  font-weight:900;
  font-size:18px;
}
.order-list{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.order{
  background:var(--card);
  border:1px solid var(--border);
  border-left:12px solid var(--green);
  border-radius:18px;
  padding:14px;
  box-shadow:0 2px 8px rgba(16,24,40,.07);
}
.order.ack{
  border-left-color:var(--amber);
  background:#fff7ed;
}
.order-name{
  font-size:31px;
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
  margin-bottom:8px;
}
.order-count{
  font-size:24px;
  font-weight:900;
  color:var(--navy);
  margin-bottom:10px;
}
.order-status{
  display:inline-block;
  font-size:15px;
  font-weight:900;
  color:var(--muted);
  background:rgba(255,255,255,.72);
  border:1px solid var(--border);
  border-radius:999px;
  padding:5px 9px;
  margin-bottom:12px;
}
.order-actions{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.order-actions button{min-height:68px}
.order.new-arrival{
  animation:newOrderPop .7s cubic-bezier(.2,.9,.25,1.2);
}
@keyframes newOrderPop{
  0%{transform:translateY(-14px) scale(.96);box-shadow:0 0 0 rgba(245,158,11,0)}
  45%{transform:translateY(2px) scale(1.025);box-shadow:0 0 0 8px rgba(245,158,11,.2)}
  100%{transform:translateY(0) scale(1);box-shadow:0 2px 8px rgba(16,24,40,.07)}
}
.attention-flash{
  position:fixed;
  inset:0;
  z-index:90;
  pointer-events:none;
  opacity:0;
  border:0 solid rgba(245,158,11,0);
  background:
    radial-gradient(circle at 50% 10%,rgba(245,158,11,.28),transparent 42%),
    linear-gradient(180deg,rgba(245,158,11,.18),transparent 38%);
}
.attention-flash.active{animation:kitchenFlash 1.25s ease-out}
@keyframes kitchenFlash{
  0%{opacity:0;border-width:0;border-color:rgba(245,158,11,0)}
  18%{opacity:1;border-width:10px;border-color:rgba(245,158,11,.9)}
  42%{opacity:.3;border-width:4px;border-color:rgba(245,158,11,.35)}
  65%{opacity:.95;border-width:8px;border-color:rgba(245,158,11,.7)}
  100%{opacity:0;border-width:0;border-color:rgba(245,158,11,0)}
}
.empty{
  min-height:55vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:34px;
  font-weight:900;
  text-align:center;
}


function flashKitchenScreen(){
  const flash = document.getElementById("attentionFlash");
  flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");
}

function detectRequestTransitions(nextRequests){
  if(!requestsInitialized){
    previousRequests = nextRequests;
    requestsInitialized = true;
    return;
  }

  const previousById = new Map(previousRequests.map(r => [r.id,r]));
  const nextById = new Map(nextRequests.map(r => [r.id,r]));

  const newItems = new Set();
  nextRequests.forEach(r => {
    if(!previousById.has(r.id) && r.status === "new"){
      newItems.add(r.item);
    }
  });

  if(newItems.size && role === "kitchen"){
    const now = Date.now();
    newItems.forEach(item => newlyArrivedItemsUntil.set(item,now + 1500));
    flashKitchenScreen();

    setTimeout(() => {
      newItems.forEach(item => newlyArrivedItemsUntil.delete(item));
      if(role === "kitchen") renderKitchen();
    },1500);
  }

  const previousOpenByItem = new Map();
  previousRequests
    .filter(r => r.status !== "done")
    .forEach(r => {
      if(!previousOpenByItem.has(r.item)) previousOpenByItem.set(r.item,[]);
      previousOpenByItem.get(r.item).push(r.id);
    });

  const nextOpenByItem = new Map();
  nextRequests
    .filter(r => r.status !== "done")
    .forEach(r => {
      if(!nextOpenByItem.has(r.item)) nextOpenByItem.set(r.item,[]);
      nextOpenByItem.get(r.item).push(r.id);
    });

  const completedItems = [];
  previousOpenByItem.forEach((ids,item) => {
    if(nextOpenByItem.has(item)) return;

    const becameDone = ids.some(id => {
      const next = nextById.get(id);
      return next && next.status === "done";
    });

    if(becameDone) completedItems.push(item);
  });

  if(completedItems.length){
    const now = Date.now();
    completedItems.forEach(item => completedProductsUntil.set(item,now + 1300));

    if(role === "sales") renderProducts();

    setTimeout(() => {
      completedItems.forEach(item => completedProductsUntil.delete(item));
      if(role === "sales") renderProducts();
    },1300);
  }

  previousRequests = nextRequests;
}

/* Chat */

  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(16,24,40,.55);
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.chat-panel{
  width:min(100%,720px);
  height:min(82vh,760px);
  background:var(--card);
  border-radius:22px 22px 0 0;
  display:grid;
  grid-template-rows:auto 1fr auto;
  box-shadow:0 -8px 36px rgba(16,24,40,.25);
}
.chat-header{
  padding:12px 14px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.chat-title{
  font-size:22px;
  font-weight:900;
}
.chat-header-actions{
  display:flex;
  gap:8px;
}
.icon-button{
  width:44px;
  min-height:44px;
  padding:0;
  border-radius:999px;
  font-size:20px;
  background:#475467;
}
.icon-button.danger{
  background:var(--danger);
}
.chat-messages{
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#f8fafc;
}
.chat-message{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px 12px;
  max-width:88%;
  font-size:18px;
  line-height:1.3;
  box-shadow:0 1px 3px rgba(16,24,40,.05);
}
.chat-message.sales{
  align-self:flex-start;

}
.chat-message.kitchen{
  align-self:flex-end;
  border-right:6px solid var(--blue);
}
.chat-meta{

  font-size:12px;

}
.chat-compose{
  padding:10px;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  background:#fff;
}
.chat-send{
  width:auto;
  min-width:90px;
  background:var(--blue);
  min-height:54px;

}
@media(max-width:520px){
  .app-title{display:none}
  .header-button{font-size:14px;padding:9px 10px}
}
@media(min-width:720px){
  .product-grid{grid-template-columns:repeat(4,1fr)}
  .order-list{grid-template-columns:repeat(2,1fr)}
  .product{min-height:110px}
}
@media(min-width:1020px){
  .order-list{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div id="attentionFlash" class="attention-flash"></div>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo">ATRIA</div>
      <div class="app-title">Keittiöbongi</div>
    </div>
    <div class="header-actions">
      <button class="header-button chat-button" onclick="openChat()">
        Chat
        <span id="chatBadge" class="chat-badge hidden">0</span>
      </button>
      <button id="modeButton" class="header-button" onclick="toggleRole()">Valitse tila</button>
    </div>
  </div>
</header>

<main>
  <section id="roleSelect" class="panel">
    <div class="role-grid">
      <button class="btn-sales" onclick="setRole('sales')">Myyntipiste</button>
      <button class="btn-kitchen" onclick="setRole('kitchen')">Keittiö</button>
    </div>
  </section>

  <section id="salesView" class="hidden">
    <div id="productGroups"></div>
    <div class="undo-wrap">
      <button id="undoButton" class="undo hidden" onclick="undoLast()">↩ Peru viimeisin pyyntö</button>
    </div>
  </section>

  <section id="kitchenView" class="hidden">
    <div class="kitchen-top">
      <div class="kitchen-title">Tilaukset</div>
      <div class="counter" id="openCount">0</div>
    </div>
    <div id="orders" class="order-list"></div>
  </section>
</main>

<section id="chatOverlay" class="chat-overlay hidden">
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-title">Chat</div>
      <div class="chat-header-actions">
        <button class="icon-button danger" onclick="clearChat()" aria-label="Poista viestihistoria">🗑️</button>
        <button class="icon-button" onclick="closeChat()" aria-label="Sulje chat">✕</button>
      </div>
    </div>
    <div id="chatMessages" class="chat-messages"></div>
    <div class="chat-compose">
      <input id="chatInput" type="text" maxlength="200" placeholder="Kirjoita viesti">
      <button class="chat-send" onclick="sendChatMessage()">Lähetä</button>
    </div>
  </div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  serverTimestamp,
  query,
  orderBy,
  enableIndexedDbPersistence,
  writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",
  authDomain: "kutsut-8e30a.firebaseapp.com",
  projectId: "kutsut-8e30a",
  storageBucket: "kutsut-8e30a.firebasestorage.app",
  messagingSenderId: "218193499800",
  appId: "1:218193499800:web:4c53bcc5951c238ed862ed",
  measurementId: "G-M44QZKKX58"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
enableIndexedDbPersistence(db).catch(() => {});

const normalProducts = [
  {g:"Lämpimät", e:"🥩", n:"Pastrami", order:1},
  {g:"Lämpimät", e:"🐔", n:"Kana", order:2},
  {g:"Lämpimät", e:"🥦", n:"Lämmin kasvis", order:3},
  {g:"Lämpimät", e:"🥔", n:"Peruna", order:4},

  {g:"Kylmät", e:"🥬", n:"Punakaali"},
  {g:"Kylmät", e:"🌿", n:"Fenkoli"},
  {g:"Kylmät", e:"🌱", n:"Herneenverso"},
  {g:"Kylmät", e:"🧅", n:"Kevätsipuli"},
  {g:"Kylmät", e:"🥒", n:"Päivän salaatti"},
  {g:"Kylmät", e:"🍅", n:"Salsa"},
  {g:"Kylmät", e:"🥣", n:"Kanankastike"},
  {g:"Kylmät", e:"🍚", n:"Riisi"},
  {g:"Kylmät", e:"🫘", n:"Kikherne"},
  {g:"Kylmät", e:"🥒", n:"Kurkkusuikale"},
  {g:"Kylmät", e:"🥒", n:"Seesamikurkku"},
  {g:"Kylmät", e:"🥗", n:"Salaattipohja"},
  {g:"Kylmät", e:"🥬", n:"Vinegrettisalaatti"}
];

const eveningProducts = [
  {g:"Iltamenu", e:"🌭", n:"Makkara"},
  {g:"Iltamenu", e:"🥙", n:"Kebabliha"},
  {g:"Iltamenu", e:"🥣", n:"Kebabkastike"},
  {g:"Iltamenu", e:"🍟", n:"Sipsit"}
];

let role = localStorage.getItem("kb_role") || "";
let allRequests = [];
let previousRequests = [];
let allChatMessages = [];
let lastRequestId = localStorage.getItem("kb_last_request_id") || "";
let chatOpen = false;
let lastSeenChatCount = Number(localStorage.getItem("kb_chat_seen_count") || 0);
let requestsInitialized = false;
const completedProductsUntil = new Map();
const newlyArrivedItemsUntil = new Map();

window.setRole = function(newRole){
  role = newRole;
  localStorage.setItem("kb_role", role);
  renderRole();
};

window.toggleRole = function(){
  if(!role) return;
  role = role === "sales" ? "kitchen" : "sales";
  localStorage.setItem("kb_role", role);
  renderRole();
};

function isEveningMenuActive(){
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();
  return minutes >= (20 * 60 + 30) || minutes < (2 * 60);
}

function getProducts(){
  return isEveningMenuActive()
    ? [...eveningProducts, ...normalProducts]
    : normalProducts;
}

function renderRole(){
  document.getElementById("roleSelect").classList.toggle("hidden", !!role);
  document.getElementById("salesView").classList.toggle("hidden", role !== "sales");
  document.getElementById("kitchenView").classList.toggle("hidden", role !== "kitchen");

  document.getElementById("modeButton").textContent =
    role === "sales" ? "Myyntipiste" :
    role === "kitchen" ? "Keittiö" :
    "Valitse tila";

  if(role === "sales") renderProducts();
  if(role === "kitchen") renderKitchen();
}

function getProductOpenState(productName){
  const open = allRequests.filter(r => r.item === productName && r.status !== "done");

  if(!open.length){
    return {
      count:0,
      state:completedProductsUntil.has(productName) ? "completed" : "none"
    };
  }

  const hasNew = open.some(r => r.status === "new");
  return hasNew
    ? {count:open.length,state:"waiting"}
    : {count:open.length,state:"acknowledged"};
}

function renderProducts(){
  const wrap = document.getElementById("productGroups");
  wrap.innerHTML = "";

  const products = getProducts();
  const groups = [...new Set(products.map(p => p.g))];

  groups.forEach(group => {
    const title = document.createElement("div");
    title.className = "group-title";
    title.textContent = group;
    wrap.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "product-grid " + (group === "Iltamenu" ? "evening" : "");
    wrap.appendChild(grid);

    products
      .filter(p => p.g === group)
      .sort((a,b) => (a.order || 999) - (b.order || 999))
      .forEach(product => {
        const status = getProductOpenState(product.n);
        const btn = document.createElement("button");
        btn.className = "product";
        if(status.state === "waiting") btn.classList.add("waiting");
        if(status.state === "acknowledged") btn.classList.add("acknowledged");
        if(status.state === "completed") btn.classList.add("completed");

        const stateText =
          status.state === "acknowledged" ? "Huomioitu" :
          status.state === "waiting" ? "Odottaa" :
          status.state === "completed" ? "Valmis" :
          "&nbsp;";

        btn.innerHTML = `
          ${status.count ? `<span class="badge">×${status.count}</span>` : ""}
          <span class="emoji">${product.e}</span>
          <span class="label">${product.n}</span>
          <span class="state-label">${stateText}</span>
        `;
        btn.onclick = () => sendRequest(product);
        grid.appendChild(btn);
      });
  });

  updateUndoButton();
}

async function sendRequest(product){
  const ref = await addDoc(collection(db,"requests"),{
    item:product.n,
    emoji:product.e,
    group:product.g,
    status:"new",
    createdAt:serverTimestamp(),
    acknowledgedAt:null,
    doneAt:null
  });

  lastRequestId = ref.id;
  localStorage.setItem("kb_last_request_id",ref.id);
  updateUndoButton();
}

function updateUndoButton(){
  const btn = document.getElementById("undoButton");
  if(!btn) return;
  const exists = allRequests.some(r => r.id === lastRequestId && r.status !== "done");
  btn.classList.toggle("hidden",!(lastRequestId && exists));
}

window.undoLast = async function(){
  if(!lastRequestId) return;
  const exists = allRequests.some(r => r.id === lastRequestId && r.status !== "done");
  if(exists) await deleteDoc(doc(db,"requests",lastRequestId));
  lastRequestId = "";
  localStorage.removeItem("kb_last_request_id");
  updateUndoButton();
};

function getGroupedOpenOrders(){
  const groups = {};

  allRequests.filter(r => r.status !== "done").forEach(r => {
    if(!groups[r.item]){
      groups[r.item] = {
        item:r.item,
        emoji:r.emoji,
        ids:[],
        newIds:[],
        ackIds:[],
        oldestSeconds:r.createdAt?.seconds || 0
      };
    }

    groups[r.item].ids.push(r.id);

    if(r.status === "new") groups[r.item].newIds.push(r.id);
    else groups[r.item].ackIds.push(r.id);

    const seconds = r.createdAt?.seconds || 0;
    if(seconds && (!groups[r.item].oldestSeconds || seconds < groups[r.item].oldestSeconds)){
      groups[r.item].oldestSeconds = seconds;
    }
  });

  return Object.values(groups).sort((a,b) => (a.oldestSeconds || 0) - (b.oldestSeconds || 0));
}

function renderKitchen(){
  const grouped = getGroupedOpenOrders();
  document.getElementById("openCount").textContent =
    allRequests.filter(r => r.status !== "done").length;

  const wrap = document.getElementById("orders");

  if(!grouped.length){
    wrap.innerHTML = '<div class="empty">Ei tilauksia</div>';
    return;
  }

  wrap.innerHTML = "";

  grouped.forEach(order => {
    const hasNew = order.newIds.length > 0;
    const isAck = !hasNew;
    const card = document.createElement("div");
    card.className = "order " + (isAck ? "ack" : "");

    if(newlyArrivedItemsUntil.has(order.item)){
      card.classList.add("new-arrival");
    }

    card.innerHTML = `
      <div class="order-name">${order.emoji || ""} ${order.item}</div>
      <div class="order-count">Tarvitaan: ${order.ids.length}</div>
      <div class="order-status">${isAck ? "HUOMIOITU" : "UUSI"}</div>
      <div class="order-actions">
        <button class="${isAck ? "btn-done" : "btn-ack"}"
          onclick="advanceGroup('${escapeJs(order.item)}','${isAck ? "ack" : "new"}')">
          ${isAck ? "VALMIS" : "HUOMIOI"}
        </button>
      </div>
    `;

    wrap.appendChild(card);
  });
}

function escapeJs(text){
  return String(text).replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}

window.advanceGroup = async function(item,state){
  const open = allRequests.filter(r => r.item === item && r.status !== "done");
  if(!open.length) return;

  const batch = writeBatch(db);

  if(state === "new"){
    open.filter(r => r.status === "new").forEach(r => {
      batch.update(doc(db,"requests",r.id),{
        status:"ack",
        acknowledgedAt:serverTimestamp()
      });
    });
  } else {
    open.forEach(r => {
      batch.update(doc(db,"requests",r.id),{
        status:"done",
        doneAt:serverTimestamp()
      });
    });
  }

  await batch.commit();
};



function flashKitchenScreen(){
  const flash = document.getElementById("attentionFlash");
  flash.classList.remove("active");
  void flash.offsetWidth;
  flash.classList.add("active");
}

function detectRequestTransitions(nextRequests){
  if(!requestsInitialized){
    previousRequests = nextRequests;
    requestsInitialized = true;
    return;
  }

  const previousById = new Map(previousRequests.map(r => [r.id,r]));
  const nextById = new Map(nextRequests.map(r => [r.id,r]));

  const newItems = new Set();
  nextRequests.forEach(r => {
    if(!previousById.has(r.id) && r.status === "new"){
      newItems.add(r.item);
    }
  });

  if(newItems.size && role === "kitchen"){
    const now = Date.now();
    newItems.forEach(item => newlyArrivedItemsUntil.set(item,now + 1500));
    flashKitchenScreen();

    setTimeout(() => {
      newItems.forEach(item => newlyArrivedItemsUntil.delete(item));
      if(role === "kitchen") renderKitchen();
    },1500);
  }

  const previousOpenByItem = new Map();
  previousRequests
    .filter(r => r.status !== "done")
    .forEach(r => {
      if(!previousOpenByItem.has(r.item)) previousOpenByItem.set(r.item,[]);
      previousOpenByItem.get(r.item).push(r.id);
    });

  const nextOpenByItem = new Map();
  nextRequests
    .filter(r => r.status !== "done")
    .forEach(r => {
      if(!nextOpenByItem.has(r.item)) nextOpenByItem.set(r.item,[]);
      nextOpenByItem.get(r.item).push(r.id);
    });

  const completedItems = [];
  previousOpenByItem.forEach((ids,item) => {
    if(nextOpenByItem.has(item)) return;

    const becameDone = ids.some(id => {
      const next = nextById.get(id);
      return next && next.status === "done";
    });

    if(becameDone) completedItems.push(item);
  });

  if(completedItems.length){
    const now = Date.now();
    completedItems.forEach(item => completedProductsUntil.set(item,now + 1300));

    if(role === "sales") renderProducts();

    setTimeout(() => {
      completedItems.forEach(item => completedProductsUntil.delete(item));
      if(role === "sales") renderProducts();
    },1300);
  }

  previousRequests = nextRequests;
}

/* Chat */
window.openChat = function(){
  chatOpen = true;
  document.getElementById("chatOverlay").classList.remove("hidden");
  lastSeenChatCount = allChatMessages.length;
  localStorage.setItem("kb_chat_seen_count",String(lastSeenChatCount));
  updateChatBadge();
  renderChat();
  setTimeout(() => {
    const box = document.getElementById("chatMessages");
    box.scrollTop = box.scrollHeight;
  }, 50);
};

window.closeChat = function(){
  chatOpen = false;
  document.getElementById("chatOverlay").classList.add("hidden");
};

window.sendChatMessage = async function(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text || !role) return;

  input.value = "";

  await addDoc(collection(db,"chatMessages"),{
    text,
    senderRole:role,
    createdAt:serverTimestamp()
  });
};

window.clearChat = async function(){
  if(!allChatMessages.length) return;
  if(!confirm("Poistetaanko koko chat-historia?")) return;

  for(let i = 0; i < allChatMessages.length; i += 400){
    const batch = writeBatch(db);
    allChatMessages.slice(i,i+400).forEach(m => {
      batch.delete(doc(db,"chatMessages",m.id));
    });
    await batch.commit();
  }
};

function renderChat(){
  const wrap = document.getElementById("chatMessages");

  if(!allChatMessages.length){
    wrap.innerHTML = '<div class="empty" style="min-height:auto;font-size:24px;padding:40px 10px">Ei viestejä</div>';
    return;
  }

  wrap.innerHTML = "";

  allChatMessages.forEach(message => {
    const div = document.createElement("div");
    div.className = "chat-message " + (message.senderRole === "kitchen" ? "kitchen" : "sales");

    const time = message.createdAt?.toDate
      ? message.createdAt.toDate().toLocaleTimeString("fi-FI",{hour:"2-digit",minute:"2-digit"})
      : "";

    div.innerHTML = `
      <div>${escapeHtml(message.text || "")}</div>
      <div class="chat-meta">
        ${message.senderRole === "kitchen" ? "Keittiö" : "Myyntipiste"}${time ? " • " + time : ""}
      </div>
    `;

    wrap.appendChild(div);
  });

  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHtml(text){
  const div = document.createElement("div");
  div.textContent = String(text);
  return div.innerHTML;
}

function updateChatBadge(){
  const badge = document.getElementById("chatBadge");
  const unread = chatOpen ? 0 : Math.max(0,allChatMessages.length - lastSeenChatCount);
  badge.textContent = unread > 99 ? "99+" : String(unread);
  badge.classList.toggle("hidden",unread === 0);
}

function listen(){
  onSnapshot(query(collection(db,"requests"),orderBy("createdAt","asc")),snapshot => {
    const nextRequests = snapshot.docs.map(d => ({id:d.id,...d.data()}));
    detectRequestTransitions(nextRequests);
    allRequests = nextRequests;
    if(role === "sales") renderProducts();
    if(role === "kitchen") renderKitchen();
  },err => alert("Yhteysvirhe: " + err.message));

  onSnapshot(query(collection(db,"chatMessages"),orderBy("createdAt","asc")),snapshot => {
    allChatMessages = snapshot.docs.map(d => ({id:d.id,...d.data()}));

    if(chatOpen){
      lastSeenChatCount = allChatMessages.length;
      localStorage.setItem("kb_chat_seen_count",String(lastSeenChatCount));
      renderChat();
    }

    updateChatBadge();
  },err => console.error("Chat-virhe:",err));
}

document.getElementById("chatInput").addEventListener("keydown",event => {
  if(event.key === "Enter"){
    event.preventDefault();
    window.sendChatMessage();
  }
});

setInterval(() => {
  if(role === "sales") renderProducts();
},60000);

renderRole();
listen();
</script>
