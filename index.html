<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Keittiöbongi</title>
<style>
:root{--atria:#d71920;--dark:#111827;--bg:#f3f4f6;--card:#fff;--green:#15803d;--blue:#1d4ed8;--gray:#4b5563;--danger:#991b1b;--text:#111827}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}header{position:sticky;top:0;z-index:20;background:var(--dark);color:#fff;padding:10px 12px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px}.logo{background:var(--atria);color:#fff;font-weight:900;letter-spacing:1px;border-radius:9px;padding:8px 12px;font-size:20px}.mode{font-size:22px;font-weight:900;text-align:right}main{padding:10px;max-width:1000px;margin:auto}.hidden{display:none!important}.card{background:var(--card);border-radius:16px;padding:12px;margin:10px 0;box-shadow:0 2px 10px rgba(0,0,0,.08)}button,input{width:100%;border:0;border-radius:14px;padding:15px;font-size:22px}button{color:#fff;font-weight:900;background:var(--gray)}input{background:#e5e7eb;color:#111827;margin-bottom:10px}.setupButtons{display:grid;grid-template-columns:1fr 1fr;gap:10px}.green{background:var(--green)}.blue{background:var(--blue)}.gray{background:var(--gray)}.danger{background:var(--danger)}.groupTitle{font-size:21px;font-weight:900;margin:20px 0 9px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.product{min-height:104px;background:var(--green);font-size:21px;line-height:1.18;position:relative}.product.waiting{background:#d97706}.badge{position:absolute;right:8px;top:8px;background:#111827;color:#fff;border-radius:999px;padding:5px 9px;font-size:15px}.undo{position:sticky;bottom:8px;margin-top:14px;box-shadow:0 4px 14px rgba(0,0,0,.25)}.kitchenHeader{display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px;font-size:22px;font-weight:900}.count{background:var(--atria);color:white;border-radius:999px;padding:7px 12px}.order{border-left:12px solid var(--green);padding:14px;min-height:150px}.order.ack{border-left-color:var(--blue);background:#eaf1ff}.orderTitle{font-size:34px;font-weight:900;line-height:1.05;margin-bottom:8px;text-transform:uppercase}.orderName{font-size:24px;font-weight:900;margin-bottom:10px}.orderButtons{display:grid;grid-template-columns:2fr 1fr;gap:10px}.orderButtons button{min-height:62px}.empty{text-align:center;font-size:32px;font-weight:900;color:#6b7280;padding:70px 10px}.smallActions{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(min-width:760px){.grid{grid-template-columns:repeat(4,1fr)}.kitchenList{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.order{margin:0}}
</style>
</head>
<body>
<header><div class="top"><div class="logo">ATRIA</div><div class="mode" id="modeText">Keittiöbongi</div></div></header>
<main>
<section id="setup" class="card"><input id="nameInput" placeholder="Nimi"><div class="setupButtons"><button class="green" onclick="saveRole('sales')">Myyntipiste</button><button class="blue" onclick="saveRole('kitchen')">Keittiö</button></div></section>
<section id="sales" class="hidden"><div id="productGroups"></div><button id="undoButton" class="undo gray hidden" onclick="undoLast()">↩ Peru viimeisin pyyntö</button><div class="smallActions"><button class="gray" onclick="changeUser()">Vaihda käyttäjä</button><button class="gray" onclick="reloadPage()">Päivitä</button></div></section>
<section id="kitchen" class="hidden"><div class="kitchenHeader"><span>Tilaukset</span><span class="count" id="openCount">0</span></div><div id="requests" class="kitchenList"></div><div class="smallActions"><button class="gray" onclick="changeUser()">Vaihda käyttäjä</button><button class="gray" onclick="reloadPage()">Päivitä</button></div></section>
</main>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";import{getFirestore,collection,addDoc,onSnapshot,updateDoc,deleteDoc,doc,serverTimestamp,query,orderBy,enableIndexedDbPersistence}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",authDomain:"kutsut-8e30a.firebaseapp.com",projectId:"kutsut-8e30a",storageBucket:"kutsut-8e30a.firebasestorage.app",messagingSenderId:"218193499800",appId:"1:218193499800:web:4c53bcc5951c238ed862ed",measurementId:"G-M44QZKKX58"};
const app=initializeApp(firebaseConfig),db=getFirestore(app);enableIndexedDbPersistence(db).catch(()=>{});
const products=[{g:"Liha",e:"🥩",n:"Pastrami"},{g:"Liha",e:"🐔",n:"Kana"},{g:"Lisukkeet",e:"🥬",n:"Punakaali"},{g:"Lisukkeet",e:"🌿",n:"Fenkoli"},{g:"Lisukkeet",e:"🌱",n:"Herneenverso"},{g:"Lisukkeet",e:"🥦",n:"Lämmin kasvis"},{g:"Lisukkeet",e:"🧅",n:"Kevätsipuli"},{g:"Lisukkeet",e:"🎃",n:"Kurpitsasalaatti"},{g:"Kastikkeet",e:"🍅",n:"Salsa"},{g:"Kastikkeet",e:"🥣",n:"Kanankastike"},{g:"Muut",e:"🍚",n:"Riisi"},{g:"Muut",e:"🫘",n:"Kikherne"},{g:"Muut",e:"🥔",n:"Peruna"},{g:"Muut",e:"🥒",n:"Kurkku"},{g:"Muut",e:"🥗",n:"Salaattipohja"},{g:"Muut",e:"🥬",n:"Vinegrettisalaatti"}];
let current={name:localStorage.getItem("kb_name")||"",role:localStorage.getItem("kb_role")||""};let allRequests=[];let lastRequestId=localStorage.getItem("kb_last_request_id")||"";
window.saveRole=function(role){const name=document.getElementById("nameInput").value.trim();if(!name){alert("Kirjoita nimi.");return}localStorage.setItem("kb_name",name);localStorage.setItem("kb_role",role);current.name=name;current.role=role;boot()};
window.changeUser=function(){localStorage.removeItem("kb_name");localStorage.removeItem("kb_role");localStorage.removeItem("kb_last_request_id");location.reload()};window.reloadPage=function(){location.reload()};
function boot(){document.getElementById("nameInput").value=current.name;if(!current.name||!current.role){document.getElementById("setup").classList.remove("hidden");document.getElementById("modeText").textContent="Keittiöbongi";return}document.getElementById("setup").classList.add("hidden");if(current.role==="sales"){document.getElementById("sales").classList.remove("hidden");document.getElementById("modeText").textContent="Myyntipiste";renderProducts()}if(current.role==="kitchen"){document.getElementById("kitchen").classList.remove("hidden");document.getElementById("modeText").textContent="Keittiö"}listen()}
function renderProducts(){const wrap=document.getElementById("productGroups");wrap.innerHTML="";[...new Set(products.map(p=>p.g))].forEach(group=>{const title=document.createElement("div");title.className="groupTitle";title.textContent=group;wrap.appendChild(title);const grid=document.createElement("div");grid.className="grid";wrap.appendChild(grid);products.filter(p=>p.g===group).forEach(product=>{const activeCount=allRequests.filter(r=>r.item===product.n&&r.status!=="done").length;const btn=document.createElement("button");btn.className="product "+(activeCount?"waiting":"");btn.innerHTML=`${product.e}<br>${product.n}${activeCount?`<span class="badge">×${activeCount}</span>`:""}`;btn.onclick=()=>sendRequest(product);grid.appendChild(btn)})});updateUndoButton()}
async function sendRequest(product){const ref=await addDoc(collection(db,"requests"),{item:product.n,emoji:product.e,group:product.g,requester:current.name,status:"new",createdAt:serverTimestamp(),acknowledgedBy:"",doneBy:""});lastRequestId=ref.id;localStorage.setItem("kb_last_request_id",ref.id);updateUndoButton()}
function updateUndoButton(){const undo=document.getElementById("undoButton");if(!undo)return;const exists=allRequests.some(r=>r.id===lastRequestId&&r.requester===current.name&&r.status!=="done");if(lastRequestId&&exists)undo.classList.remove("hidden");else undo.classList.add("hidden")}
window.undoLast=async function(){if(!lastRequestId)return;const found=allRequests.find(r=>r.id===lastRequestId&&r.requester===current.name&&r.status!=="done");if(!found){localStorage.removeItem("kb_last_request_id");lastRequestId="";updateUndoButton();return}await deleteDoc(doc(db,"requests",lastRequestId));localStorage.removeItem("kb_last_request_id");lastRequestId="";updateUndoButton()};
function listen(){onSnapshot(query(collection(db,"requests"),orderBy("createdAt","asc")),snap=>{allRequests=snap.docs.map(d=>({id:d.id,...d.data()}));if(current.role==="sales")renderProducts();if(current.role==="kitchen")renderKitchen()},err=>{document.getElementById("modeText").textContent="Virhe";alert("Firebase-virhe: "+err.message)})}
function renderKitchen(){const el=document.getElementById("requests");const open=allRequests.filter(r=>r.status!=="done");document.getElementById("openCount").textContent=open.length;if(!open.length){el.innerHTML='<div class="empty">Ei tilauksia</div>';return}el.innerHTML="";open.forEach(order=>{const card=document.createElement("div");card.className="card order "+(order.status==="ack"?"ack":"");const actionText=order.status==="ack"?"VALMIS":"HUOMIOITU";const actionClass=order.status==="ack"?"green":"blue";card.innerHTML=`<div class="orderTitle">${order.emoji||""} ${order.item}</div><div class="orderName">${order.requester||""}</div>${order.acknowledgedBy?`<div class="orderName">Huomioitu: ${order.acknowledgedBy}</div>`:""}<div class="orderButtons"><button class="${actionClass}" onclick="advanceOrder('${order.id}','${order.status}')">${actionText}</button><button class="danger" onclick="removeOrder('${order.id}')">Poista</button></div>`;el.appendChild(card)})}
window.advanceOrder=async function(id,status){const ref=doc(db,"requests",id);if(status==="new")await updateDoc(ref,{status:"ack",acknowledgedBy:current.name,acknowledgedAt:serverTimestamp()});else await updateDoc(ref,{status:"done",doneBy:current.name,doneAt:serverTimestamp()})};window.removeOrder=async function(id){await deleteDoc(doc(db,"requests",id))};boot();
</script>
</body>
</html>
