<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Atria Keittiöbongi</title>
<style>
:root{--red:#c8102e;--navy:#101828;--bg:#f2f4f7;--card:#fff;--border:#d0d5dd;--text:#101828;--muted:#667085;--green:#12805c;--blue:#175cd3;--danger:#b42318;--amber:#b54708}
*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
header{position:sticky;top:0;z-index:50;background:var(--navy);color:white;box-shadow:0 2px 14px rgba(16,24,40,.22)}
.header-inner{max-width:1100px;margin:0 auto;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{background:var(--red);color:white;font-weight:900;letter-spacing:.8px;border-radius:10px;padding:8px 12px;font-size:20px;line-height:1}.app-title{font-weight:900;font-size:20px;white-space:nowrap}.header-actions{display:flex;align-items:center;gap:8px}.mode-button,.trash-button{width:auto;min-height:44px;padding:9px 12px;border-radius:999px;font-size:16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18)}.trash-button{width:44px;padding:0;font-size:22px}
main{max-width:1100px;margin:0 auto;padding:14px}.hidden{display:none!important}.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 2px 8px rgba(16,24,40,.06)}
button{border:0;border-radius:14px;padding:16px;min-height:60px;font-size:20px;font-weight:900;cursor:pointer;color:white;background:#344054;user-select:none}button:active{transform:scale(.985)}.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn-sales,.btn-done{background:var(--green)}.btn-kitchen,.btn-ack{background:var(--blue)}.btn-danger{background:var(--danger)}
.group-title{margin:18px 0 10px;font-size:19px;font-weight:900;color:var(--navy)}.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.product{background:var(--card);color:var(--text);border:2px solid var(--border);min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;position:relative;box-shadow:0 1px 3px rgba(16,24,40,.08)}.product .emoji{font-size:30px;line-height:1}.product .label{font-size:18px;line-height:1.05}.product.waiting{border-color:var(--amber);background:#fff7ed}.product.acknowledged{border-color:var(--blue);background:#e8f0ff}.evening .product{border-color:#98a2b3;background:#f8fafc}.evening .product.waiting{border-color:var(--amber);background:#fff7ed}.evening .product.acknowledged{border-color:var(--blue);background:#e8f0ff}.badge{position:absolute;top:7px;right:7px;background:var(--amber);color:white;border-radius:999px;padding:4px 8px;font-size:14px;font-weight:900}.product.acknowledged .badge{background:var(--blue)}
.undo-wrap{position:sticky;bottom:10px;z-index:30;margin-top:14px}.undo{background:#344054;box-shadow:0 8px 24px rgba(16,24,40,.25)}
.kitchen-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.kitchen-title{font-size:24px;font-weight:900}.counter{background:var(--red);color:white;border-radius:999px;padding:8px 13px;font-weight:900;font-size:18px}.order-list{display:grid;grid-template-columns:1fr;gap:10px}.order{background:var(--card);border:1px solid var(--border);border-left:12px solid var(--green);border-radius:18px;padding:14px;box-shadow:0 2px 8px rgba(16,24,40,.07)}.order.ack{border-left-color:var(--blue);background:#e8f0ff}.order-name{font-size:31px;font-weight:900;text-transform:uppercase;line-height:1.05;margin-bottom:8px}.order-count{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:10px}.order-status{display:inline-block;font-size:15px;font-weight:900;color:var(--muted);background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:999px;padding:5px 9px;margin-bottom:12px}.order-actions{display:grid;grid-template-columns:2fr 1fr;gap:10px}.order-actions button{min-height:64px}.empty{min-height:55vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:34px;font-weight:900;text-align:center}
@media(max-width:520px){.app-title{display:none}.mode-button{font-size:15px;padding:9px 10px}}@media(min-width:720px){.product-grid{grid-template-columns:repeat(4,1fr)}.order-list{grid-template-columns:repeat(2,1fr)}.product{min-height:110px}}@media(min-width:1020px){.order-list{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header><div class="header-inner"><div class="brand"><div class="logo">ATRIA</div><div class="app-title">Keittiöbongi</div></div><div class="header-actions"><button id="modeButton" class="mode-button" onclick="toggleRole()">Valitse tila</button><button class="trash-button" onclick="clearHistory()" aria-label="Poista koko historia">🗑️</button></div></div></header>
<main>
<section id="roleSelect" class="panel"><div class="role-grid"><button class="btn-sales" onclick="setRole('sales')">Myyntipiste</button><button class="btn-kitchen" onclick="setRole('kitchen')">Keittiö</button></div></section>
<section id="salesView" class="hidden"><div id="productGroups"></div><div class="undo-wrap"><button id="undoButton" class="undo hidden" onclick="undoLast()">↩ Peru viimeisin pyyntö</button></div></section>
<section id="kitchenView" class="hidden"><div class="kitchen-top"><div class="kitchen-title">Tilaukset</div><div class="counter" id="openCount">0</div></div><div id="orders" class="order-list"></div></section>
</main>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import{getFirestore,collection,addDoc,onSnapshot,deleteDoc,doc,serverTimestamp,query,orderBy,enableIndexedDbPersistence,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",authDomain:"kutsut-8e30a.firebaseapp.com",projectId:"kutsut-8e30a",storageBucket:"kutsut-8e30a.firebasestorage.app",messagingSenderId:"218193499800",appId:"1:218193499800:web:4c53bcc5951c238ed862ed",measurementId:"G-M44QZKKX58"};
const app=initializeApp(firebaseConfig),db=getFirestore(app);enableIndexedDbPersistence(db).catch(()=>{});
const normalProducts=[
{g:"Lämpimät",e:"🥩",n:"Pastrami",order:1},{g:"Lämpimät",e:"🐔",n:"Kana",order:2},{g:"Lämpimät",e:"🥦",n:"Lämmin kasvis",order:3},{g:"Lämpimät",e:"🥔",n:"Peruna",order:4},
{g:"Kylmät",e:"🥬",n:"Punakaali"},{g:"Kylmät",e:"🌿",n:"Fenkoli"},{g:"Kylmät",e:"🌱",n:"Herneenverso"},{g:"Kylmät",e:"🧅",n:"Kevätsipuli"},{g:"Kylmät",e:"🥒",n:"Vinaigrette kurkkuslaw"},{g:"Kylmät",e:"🍅",n:"Salsa"},{g:"Kylmät",e:"🥣",n:"Kanankastike"},{g:"Kylmät",e:"🍚",n:"Riisi"},{g:"Kylmät",e:"🫘",n:"Kikherne"},{g:"Kylmät",e:"🥒",n:"Kurkkusuikale"},{g:"Kylmät",e:"🥒",n:"Seesamikurkku"},{g:"Kylmät",e:"🥗",n:"Salaattipohja"},{g:"Kylmät",e:"🥬",n:"Vinegrettisalaatti"}
];
const eveningProducts=[{g:"Iltamenu",e:"🌭",n:"Makkara"},{g:"Iltamenu",e:"🥙",n:"Kebabliha"},{g:"Iltamenu",e:"🥣",n:"Kebabkastike"},{g:"Iltamenu",e:"🍟",n:"Sipsit"}];
let role=localStorage.getItem("kb_role")||"",allRequests=[],lastRequestId=localStorage.getItem("kb_last_request_id")||"";
window.setRole=function(newRole){role=newRole;localStorage.setItem("kb_role",role);renderRole()};
window.toggleRole=function(){if(!role)return;role=role==="sales"?"kitchen":"sales";localStorage.setItem("kb_role",role);renderRole()};
function isEveningMenuActive(){const now=new Date(),minutes=now.getHours()*60+now.getMinutes();return minutes>=1230||minutes<120}
function getProducts(){return isEveningMenuActive()?[...eveningProducts,...normalProducts]:normalProducts}
function renderRole(){document.getElementById("roleSelect").classList.toggle("hidden",!!role);document.getElementById("salesView").classList.toggle("hidden",role!=="sales");document.getElementById("kitchenView").classList.toggle("hidden",role!=="kitchen");document.getElementById("modeButton").textContent=role==="sales"?"Myyntipiste":role==="kitchen"?"Keittiö":"Valitse tila";if(role==="sales")renderProducts();if(role==="kitchen")renderKitchen()}
function getProductOpenState(productName){const open=allRequests.filter(r=>r.item===productName&&r.status!=="done");if(!open.length)return{count:0,state:"none"};return open.some(r=>r.status==="new")?{count:open.length,state:"waiting"}:{count:open.length,state:"acknowledged"}}
function renderProducts(){const wrap=document.getElementById("productGroups");wrap.innerHTML="";const products=getProducts(),groups=[...new Set(products.map(p=>p.g))];groups.forEach(group=>{const title=document.createElement("div");title.className="group-title";title.textContent=group;wrap.appendChild(title);const grid=document.createElement("div");grid.className="product-grid "+(group==="Iltamenu"?"evening":"");wrap.appendChild(grid);products.filter(p=>p.g===group).sort((a,b)=>(a.order||999)-(b.order||999)).forEach(product=>{const status=getProductOpenState(product.n),btn=document.createElement("button");btn.className="product";if(status.state==="waiting")btn.classList.add("waiting");if(status.state==="acknowledged")btn.classList.add("acknowledged");btn.innerHTML=`${status.count?`<span class="badge">×${status.count}</span>`:""}<span class="emoji">${product.e}</span><span class="label">${product.n}</span>`;btn.onclick=()=>sendRequest(product);grid.appendChild(btn)})});updateUndoButton()}
async function sendRequest(product){const ref=await addDoc(collection(db,"requests"),{item:product.n,emoji:product.e,group:product.g,status:"new",createdAt:serverTimestamp(),acknowledgedAt:null,doneAt:null});lastRequestId=ref.id;localStorage.setItem("kb_last_request_id",ref.id);updateUndoButton()}
function updateUndoButton(){const btn=document.getElementById("undoButton");if(!btn)return;const exists=allRequests.some(r=>r.id===lastRequestId&&r.status!=="done");btn.classList.toggle("hidden",!(lastRequestId&&exists))}
window.undoLast=async function(){if(!lastRequestId)return;const exists=allRequests.some(r=>r.id===lastRequestId&&r.status!=="done");if(exists)await deleteDoc(doc(db,"requests",lastRequestId));lastRequestId="";localStorage.removeItem("kb_last_request_id");updateUndoButton()};
function listen(){onSnapshot(query(collection(db,"requests"),orderBy("createdAt","asc")),snapshot=>{allRequests=snapshot.docs.map(d=>({id:d.id,...d.data()}));if(role==="sales")renderProducts();if(role==="kitchen")renderKitchen()},err=>alert("Yhteysvirhe: "+err.message))}
function getGroupedOpenOrders(){const groups={};allRequests.filter(r=>r.status!=="done").forEach(r=>{if(!groups[r.item])groups[r.item]={item:r.item,emoji:r.emoji,ids:[],newIds:[],ackIds:[],oldestSeconds:r.createdAt?.seconds||0};groups[r.item].ids.push(r.id);if(r.status==="new")groups[r.item].newIds.push(r.id);else groups[r.item].ackIds.push(r.id);const seconds=r.createdAt?.seconds||0;if(seconds&&(!groups[r.item].oldestSeconds||seconds<groups[r.item].oldestSeconds))groups[r.item].oldestSeconds=seconds});return Object.values(groups).sort((a,b)=>(a.oldestSeconds||0)-(b.oldestSeconds||0))}
function renderKitchen(){const grouped=getGroupedOpenOrders(),openCount=allRequests.filter(r=>r.status!=="done").length;document.getElementById("openCount").textContent=openCount;const wrap=document.getElementById("orders");if(!grouped.length){wrap.innerHTML='<div class="empty">Ei tilauksia</div>';return}wrap.innerHTML="";grouped.forEach(order=>{const card=document.createElement("div"),hasNew=order.newIds.length>0,isAck=!hasNew;card.className="order "+(isAck?"ack":"");card.innerHTML=`<div class="order-name">${order.emoji||""} ${order.item}</div><div class="order-count">Tarvitaan: ${order.ids.length}</div><div class="order-status">${isAck?"HUOMIOITU":"UUSI"}</div><div class="order-actions"><button class="${isAck?"btn-done":"btn-ack"}" onclick="advanceGroup('${order.item}','${isAck?"ack":"new"}')">${isAck?"VALMIS":"HUOMIOITU"}</button><button class="btn-danger" onclick="removeGroup('${order.item}')">Poista</button></div>`;wrap.appendChild(card)})}
window.advanceGroup=async function(item,state){const open=allRequests.filter(r=>r.item===item&&r.status!=="done");if(!open.length)return;const batch=writeBatch(db);if(state==="new")open.filter(r=>r.status==="new").forEach(r=>batch.update(doc(db,"requests",r.id),{status:"ack",acknowledgedAt:serverTimestamp()}));else open.forEach(r=>batch.update(doc(db,"requests",r.id),{status:"done",doneAt:serverTimestamp()}));await batch.commit()};
window.removeGroup=async function(item){const open=allRequests.filter(r=>r.item===item&&r.status!=="done");if(!open.length)return;const batch=writeBatch(db);open.forEach(r=>batch.delete(doc(db,"requests",r.id)));await batch.commit()};
window.clearHistory=async function(){if(!allRequests.length)return;if(!confirm("Poistetaanko koko viestihistoria?"))return;for(let i=0;i<allRequests.length;i+=400){const batch=writeBatch(db);allRequests.slice(i,i+400).forEach(r=>batch.delete(doc(db,"requests",r.id)));await batch.commit()}lastRequestId="";localStorage.removeItem("kb_last_request_id")};
setInterval(()=>{if(role==="sales")renderProducts()},60000);renderRole();listen();
</script>
</body>
</html>
