<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#141414" />
  <title>FestariCall</title>
  <style>
    :root{--bg:#141414;--card:#222;--muted:#aaa;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--yellow:#f59e0b;--text:#fff;--line:#333}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px;padding-bottom:32px}
    h1{margin:10px 0 4px;font-size:34px;line-height:1.05}
    h2{margin:18px 0 10px;font-size:22px}.muted{color:var(--muted)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}.pill{border:1px solid var(--line);border-radius:999px;padding:8px 12px;color:#ddd;font-size:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
    .roleGrid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}.roleBtn{font-size:24px;border:0;border-radius:20px;color:white;padding:28px 16px;font-weight:800}.sales{background:var(--green)}.kitchen{background:var(--blue)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}.itemBtn{min-height:92px;border:0;border-radius:18px;color:white;background:var(--green);font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;box-shadow:0 5px 0 rgba(0,0,0,.35)}
    .itemBtn:active,.smallBtn:active,.doneBtn:active,.roleBtn:active{transform:translateY(2px);box-shadow:none}.itemBtn.pending{background:var(--red)}.itemBtn.flash{background:var(--blue)!important}
    .bar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:10px}.smallBtn{border:0;border-radius:999px;padding:10px 13px;background:#333;color:white;font-weight:700}.danger{background:#7f1d1d}.back{background:#333}
    .request{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#2a2a2a;border:1px solid #3a3a3a;border-radius:16px;padding:14px;margin-bottom:10px}.request strong{font-size:22px}.request .time{color:#bbb;font-size:14px;margin-top:3px}.doneBtn{border:0;border-radius:14px;background:var(--green);color:white;font-weight:900;padding:16px 14px;font-size:16px}.empty{padding:22px;text-align:center;color:#bbb;border:1px dashed #444;border-radius:16px}
    .toast{position:fixed;left:14px;right:14px;bottom:18px;background:#fff;color:#111;border-radius:18px;padding:16px;font-weight:900;text-align:center;transform:translateY(150%);transition:.22s;z-index:99}.toast.show{transform:translateY(0)}
    @media(min-width:700px){body{max-width:820px;margin:auto}.grid{grid-template-columns:repeat(3,1fr)}.roleGrid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="top"><div><h1>FestariCall</h1><div class="muted">Täydennyspyynnöt ilman huutokonserttia.</div></div><div class="pill" id="status">Yhdistetään…</div></div>

  <section id="roleView" class="card">
    <h2>Kumpi olet?</h2>
    <div class="roleGrid">
      <button class="roleBtn sales" onclick="setRole('sales')">🍔 Myyntipiste<br><span style="font-size:15px;font-weight:600">Lähetä pyyntöjä</span></button>
      <button class="roleBtn kitchen" onclick="setRole('kitchen')">👨‍🍳 Keittiö<br><span style="font-size:15px;font-weight:600">Vastaanota ja kuittaa</span></button>
    </div>
  </section>

  <section id="salesView" style="display:none">
    <div class="bar"><h2>🍔 Myyntipiste</h2><button class="smallBtn back" onclick="resetRole()">Vaihda rooli</button></div>
    <div class="muted">Paina tuotetta kerran. Punainen = pyyntö aktiivinen.</div>
    <div class="grid" id="productGrid"></div>
  </section>

  <section id="kitchenView" style="display:none">
    <div class="bar"><h2>👨‍🍳 Keittiö</h2><button class="smallBtn back" onclick="resetRole()">Vaihda rooli</button></div>
    <div class="bar"><div class="muted">Uusimmat pyynnöt ylhäällä.</div><button class="smallBtn danger" onclick="clearDone()">Siivoa kuitatut</button></div>
    <div id="requests" style="margin-top:14px"></div>
  </section>

  <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBbPAS__KYZ911xs9Q77a7wxfX1FWVKPyI",
  authDomain: "kutsut-8e30a.firebaseapp.com",
  projectId: "kutsut-8e30a",
  storageBucket: "kutsut-8e30a.firebasestorage.app",
  messagingSenderId: "218193499800",
  appId: "1:218193499800:web:4c53bcc5951c238ed862ed",
  measurementId: "G-M44QZKKX58"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const products = [
  ["🥩","Pastrami"],["🐔","Kana"],["🥬","Punakaali"],["🌿","Fenkoli"],["🍚","Riisi"],["🫘","Kikherne"],["🥣","Kanankastike"],["🥔","Peruna"],["🥒","Kurkku"],["🍅","Salsa"],["🥗","Salaattipohja"],["🥬","Vinegrettisalaatti"],["🧅","Kevätsipuli"],["🎃","Kurpitsasalaatti"]
];
let active = new Map();
let currentRole = localStorage.getItem("festariRole") || "";
let firstKitchenLoad = true;
const statusEl = document.getElementById("status");
const toastEl = document.getElementById("toast");

window.setRole = function(role){ localStorage.setItem("festariRole", role); currentRole = role; renderRole(); }
window.resetRole = function(){ localStorage.removeItem("festariRole"); currentRole=""; renderRole(); }
function renderRole(){
  document.getElementById("roleView").style.display = currentRole ? "none" : "block";
  document.getElementById("salesView").style.display = currentRole === "sales" ? "block" : "none";
  document.getElementById("kitchenView").style.display = currentRole === "kitchen" ? "block" : "none";
}

function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); setTimeout(()=>toastEl.classList.remove("show"),1700); }
function buzz(){ if(navigator.vibrate) navigator.vibrate([250,80,250]); }
function fmt(ts){ try { return ts?.toDate().toLocaleTimeString("fi-FI",{hour:"2-digit",minute:"2-digit"}) || "nyt"; } catch { return "nyt"; } }

function renderButtons(){
  const grid = document.getElementById("productGrid");
  grid.innerHTML = "";
  products.forEach(([emoji,name])=>{
    const b = document.createElement("button");
    b.className = "itemBtn" + (active.has(name) ? " pending" : "");
    b.innerHTML = `<span style="font-size:30px">${emoji}</span><span>${name}</span>`;
    b.onclick = () => requestItem(name, emoji);
    b.id = "btn-" + name;
    grid.appendChild(b);
  });
}

async function requestItem(name, emoji){
  try{
    await addDoc(collection(db,"requests"), { item:name, emoji, status:"open", createdAt:serverTimestamp(), doneAt:null });
    showToast(`${name} pyydetty`); buzz();
  } catch(e){ showToast("Tallennus epäonnistui. Tarkista Firestore-säännöt."); console.error(e); }
}

function renderRequests(docs){
  const box = document.getElementById("requests");
  const openDocs = docs.filter(d=>d.data().status === "open");
  if(openDocs.length === 0){ box.innerHTML = `<div class="empty">Ei aktiivisia pyyntöjä. Keittiön valtakunta on hetken rauhassa.</div>`; return; }
  box.innerHTML = "";
  openDocs.forEach(d=>{
    const r = d.data();
    const div = document.createElement("div");
    div.className = "request";
    div.innerHTML = `<div><strong>${r.emoji || "🔔"} ${r.item}</strong><div class="time">Pyydetty ${fmt(r.createdAt)}</div></div>`;
    const btn = document.createElement("button");
    btn.className = "doneBtn";
    btn.textContent = "Valmis";
    btn.onclick = async()=> updateDoc(doc(db,"requests",d.id), { status:"done", doneAt:serverTimestamp() });
    div.appendChild(btn);
    box.appendChild(div);
  });
}

window.clearDone = async function(){
  const qDone = query(collection(db,"requests"), where("status","==","done"));
  const snap = await getDocs(qDone);
  await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,"requests",d.id))));
  showToast("Kuitatut siivottu");
}

const qAll = query(collection(db,"requests"), orderBy("createdAt","desc"));
onSnapshot(qAll, snap=>{
  statusEl.textContent = "Online";
  const docs = snap.docs;
  const nextActive = new Map();
  docs.forEach(d=>{ const r=d.data(); if(r.status === "open") nextActive.set(r.item, d.id); });

  if(currentRole === "kitchen" && !firstKitchenLoad){
    snap.docChanges().forEach(ch=>{ if(ch.type === "added" && ch.doc.data().status === "open"){ showToast(`${ch.doc.data().item} pyydetty`); buzz(); } });
  }
  firstKitchenLoad = false;

  // flash when item is completed on sales screen
  active.forEach((id,item)=>{ if(!nextActive.has(item)){ const b=document.getElementById("btn-"+item); if(b){ b.classList.add("flash"); setTimeout(()=>b.classList.remove("flash"),900); } } });
  active = nextActive;
  renderButtons();
  renderRequests(docs);
}, err=>{ statusEl.textContent = "Virhe"; showToast("Firebase-yhteys ei onnistu"); console.error(err); });

renderRole();
renderButtons();
</script>
</body>
</html>
